<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0a12"/>
      <stop offset="1" stop-color="#060609"/>
    </linearGradient>
    <radialGradient id="g1" cx="0.78" cy="0.2" r="0.5">
      <stop offset="0" stop-color="#b06bff" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#b06bff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="0.12" cy="0.85" r="0.5">
      <stop offset="0" stop-color="#16c2a3" stop-opacity="0.26"/>
      <stop offset="1" stop-color="#16c2a3" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g3" cx="0.6" cy="0.95" r="0.45">
      <stop offset="0" stop-color="#ffb15c" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#ffb15c" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="rule" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#16c2a3"/>
      <stop offset="0.5" stop-color="#b06bff"/>
      <stop offset="1" stop-color="#ffb15c"/>
    </linearGradient>
    <linearGradient id="name" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#b8b8c4"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#g1)"/>
  <rect width="1200" height="630" fill="url(#g2)"/>
  <rect width="1200" height="630" fill="url(#g3)"/>
  <rect x="1" y="1" width="1198" height="628" fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="2"/>

  <!-- top brand dot + label -->
  <g transform="translate(80,86)">
    <circle cx="9" cy="-5" r="9" fill="url(#rule)"/>
    <text x="30" y="2" font-family="'Helvetica Neue',Arial,sans-serif" font-size="26" font-weight="600" fill="#e9e9ee" letter-spacing="1">Shahin Rahbariasl</text>
  </g>

  <!-- main name -->
  <text x="78" y="300" font-family="'Helvetica Neue',Arial,sans-serif" font-size="118" font-weight="800" fill="url(#name)" letter-spacing="-3">SHAHIN</text>
  <text x="78" y="412" font-family="'Helvetica Neue',Arial,sans-serif" font-size="118" font-weight="800" fill="url(#name)" letter-spacing="-3">RAHBARIASL</text>

  <!-- gradient rule -->
  <rect x="82" y="452" width="170" height="6" rx="3" fill="url(#rule)"/>

  <!-- three crafts -->
  <text x="80" y="528" font-family="'Helvetica Neue',Arial,sans-serif" font-size="34" font-weight="600" letter-spacing="1">
    <tspan fill="#16c2a3">Code</tspan><tspan fill="#5b5b66">  ·  </tspan><tspan fill="#b06bff">Music</tspan><tspan fill="#5b5b66">  ·  </tspan><tspan fill="#ffb15c">Photography</tspan>
  </text>

  <!-- tagline -->
  <text x="80" y="574" font-family="'Helvetica Neue',Arial,sans-serif" font-size="23" font-weight="400" fill="#8a8a93">Senior Software Engineer · Distributed systems at internet scale · MFL</text>
  <text x="80" y="606" font-family="'Helvetica Neue',Arial,sans-serif" font-size="20" font-weight="400" fill="#5b5b66">Toronto, Canada</text>
</svg>
